# MetroRide PH — Netlify Deployment Configuration
# Fixes 404 errors on page refresh for deep-linked SPA routes.
# All requests are rewritten to /index.html (200, not 301/302),
# letting Expo Router handle client-side navigation.
#
# Security hardening: HSTS, X-Frame-Options, CSP, Referrer-Policy

[build]
  publish = "dist"
  functions = "netlify/functions"

# ── Security Headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Strict Transport Security — 2-year max-age, include subdomains, preload
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Prevent clickjacking — deny all iframe embedding
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Referrer Policy — send origin only on cross-origin requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable legacy XSS auditor and block on detection
    X-XSS-Protection = "1; mode=block"

    # Permissions Policy — restrict sensitive browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"

    # Content Security Policy — strict, no inline scripts/eval
    # Allows connections only to MetroRide origins, Supabase, and Newell AI
    Content-Security-Policy = "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://wgjaepoxjxooxhdainod.supabase.co wss://wgjaepoxjxooxhdainod.supabase.co https://newell.fastshot.ai https://oauth.fastshot.ai https://www.google.com; font-src 'self' data:; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

# ── Static asset cache headers ───────────────────────────────────────────────
[[headers]]
  for = "/_expo/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# ── SPA routing — rewrite all routes to index.html ──────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
